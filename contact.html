<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="styles.css" rel="stylesheet" />
    <title>Contact - Angie-one</title>
</head>
<body class="text-white"> <section class="min-vh-100">
        <div class="container py-4">
            <nav class="navbar navbar-expand-md navbar-dark">
                <div class="container-fluid">
                    <a class="navbar-brand" href="index.html">
                        <div class="titles">
                            <h1 class="m-0">Angelique Ligney</h1>
                            <h2 class="m-0 ps-3">Aka Angie-one</h2>
                        </div>
                    </a>
                    <button class="navbar-toggler ms-auto" type="button" data-bs-toggle="collapse" data-bs-target="#navbarMenu">
                        <span class="navbar-toggler-icon"></span>
                    </button>
                    <div class="collapse navbar-collapse justify-content-end" id="navbarMenu">
                        <ul class="navbar-nav">
                            <li class="nav-item me-3"><a class="nav-link text-white" href="apropos.html">A propos</a></li>
                            <li class="nav-item me-3"><a class="nav-link text-white" href="developpement.html">Mon Portfolio</a></li>
                            <li class="nav-item me-3"><a class="nav-link text-white" href="#contact">Contact</a></li>
                        </ul>
                    </div>
                </div>
            </nav>

            <article class="mt-5">
                <h1 class="text-center">Contact</h1>
                <p class="text-center">Vous pouvez me contacter via ce formulaire :</p>
                
                <div class="row justify-content-center">
                    <div class="col-md-6">
                        <form name="contact" method="POST" data-netlify="true" netlify-honeypot="bot-field">
                            <input type="hidden" name="bot-field" />
                            
                            <div class="mb-3">
                                <label for="name" class="form-label">Nom</label>
                                <input type="text" name="name" id="name" class="form-control" placeholder="Votre nom" required>
                            </div>
                            
                            <div class="mb-3">
                                <label for="email" class="form-label">Email</label>
                                <input type="email" name="email" id="email" class="form-control" placeholder="nom@exemple.com" required>
                            </div>
                            
                            <div class="mb-3">
                                <label for="message" class="form-label">Message</label>
                                <textarea name="message" id="message" class="form-control" rows="4" required></textarea>
                            </div>
                            
                            <div class="d-grid">
                                <button type="submit" class="btn btn-outline-light">Envoyer</button>
                            </div>
                        </form>

                        <hr class="my-5">

                        <p class="text-center">
                            Ou via LinkedIn : <br>
                            <a href="https://www.linkedin.com/in/ang%C3%A9lique-l-8050a9200/" target="_blank" rel="noopener noreferrer" class="text-white fw-bold">
                                Angelique Ligney
                            </a>
                        </p>
                    </div>
                </div>
            </article>
        </div>
    </section>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
